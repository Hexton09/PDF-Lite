name: Build Flet APK
on: 
  workflow_dispatch: # This enables the manual "Run" button

jobs:
  build:
    if: github.ref == 'refs/heads/android'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: android

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12' # Latest stable Python

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu' # Highly recommended for Android builds
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true # Speeds up future manual runs

      - name: Install Flet & Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet cryptography pikepdf pypdf

      - name: Build APK
        run: flet build apk
        
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pdf-lite-latest-apk
          path: build/apk/*.apk
          compression-level: 9 # Max compression for smaller download
