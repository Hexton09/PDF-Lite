name: Build Flet APK
on: 
  workflow_dispatch: # This enables the manual "Run" button

jobs:
  build:
    # Ensure this only runs if we are on the android-version branch
    if: github.ref == 'refs/heads/android'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          ref: android # Explicitly checkout this branch

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Flet
        run: pip install flet

      - name: Build APK
        run: flet build apk
        
      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: pdf-lite-apk
          path: build/apk/*.apk
