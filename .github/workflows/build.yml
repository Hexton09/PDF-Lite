name: Build Flet APK
on: 
  workflow_dispatch:

jobs:
  build:
    # Now only allows execution if the 'android' branch is selected
    if: github.ref == 'refs/heads/android'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: android

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Accept Android Licenses
        run: yes | sdkmanager --licenses || true

      - name: Install Flet & Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet cryptography pikepdf pypdf 

      - name: Build APK
        run: flet build apk
        
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pdf-lite-android-apk
          path: build/apk/*.apk
